spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/purchaseai}
    username: ${DB_USER:purchaseai}
    password: ${DB_PASS:purchaseai}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties.hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-at-least-32-chars!!}
    expiration-ms: 86400000

server:
  port: 8080
