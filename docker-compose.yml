services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: purchaseai
      POSTGRES_USER: purchaseai
      POSTGRES_PASSWORD: purchaseai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purchaseai"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/purchaseai
      DB_USER: purchaseai
      DB_PASS: purchaseai
      JWT_SECRET: change-me-in-production-at-least-32-chars!!
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
